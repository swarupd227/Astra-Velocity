name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: astra
          POSTGRES_PASSWORD: astra_ci
          POSTGRES_DB: astra_velocity_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U astra"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgres://astra:astra_ci@localhost:5432/astra_velocity_test
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-only-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run db:migrate
      - run: npm run test
      - run: npm run build
